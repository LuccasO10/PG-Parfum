<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo de Perfumes | P&G Parfum</title>

  <link rel="stylesheet" href="assets/css/perfumes.css" />
</head>
<body>

  <div class="catalogo">

    <!-- NAVBAR -->
    <nav>
      <img src="assets/img/logo.png" alt="P&G" class="logo" />

      <ul class="nav-links">
        <li><a href="index.html">INÍCIO</a></li>
        <li><a href="perfumes.html" class="active">PERFUMES</a></li>
        <li><a href="sobre.html">SOBRE NÓS</a></li>
        <li><a href="contato.html">CONTATO</a></li>
      </ul>

      <div class="icons-top"> 
        <ion-icon name="person-outline"></ion-icon>
        <ion-icon name="bag-outline"></ion-icon>
      </div>
    </nav>

    <!-- SEÇÃO CATÁLOGO -->
    <section class="catalogo-section">
      <div class="titulo">
        <h1>CATÁLOGO DE PERFUMES</h1>
        <p>Explore nossas fragrâncias exclusivas</p>
      </div>

      <div class="grid-perfumes">
        <div class="perfume">
          <img src="assets/img/perfume.png" alt="Lumière Élégant">

        <div class="perfume">
          <img src="assets/img/perfume.png" alt="Noir Suprême">

        </div>

      </div>

      <div class="beneficios">
        <div class="item">
          <ion-icon name="flask-outline"></ion-icon>
          <p>Inspirados em grandes sucessos</p>
        </div>
        <div class="item">
          <ion-icon name="shield-checkmark-outline"></ion-icon>
          <p>Alta fixação e projeção</p>
        </div>
        <div class="item">
          <ion-icon name="diamond-outline"></ion-icon>
          <p>Qualidade premium preço justo</p>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
